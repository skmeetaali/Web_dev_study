<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover</title>
    <style>
        button {
            width: 75px;
            height: 25px;
            color: black;
            background-color: white;
        }
        button:hover {
            color: white;
            background-color: black;
            width: 80px;
            height: 30px;
            transition: 0.5s;
        }
    </style>
</head>
<body>
    <button>
        Click me
    </button>
</body>
</html>
