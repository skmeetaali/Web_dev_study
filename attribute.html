<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute</title>
    <style>
        a {
            color: black;
        }

        a[href="www.youtube.com"] {
            color: purple;
        }
    </style>
</head>

<body>
    <ul>
        <li><a href="www.google.com">Google</a></li>
        <li><a href="www.youtube.com">youtube</a></li>
    </ul>
</body>

</html>
